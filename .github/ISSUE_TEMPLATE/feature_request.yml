name: Feature Request
description: Suggest a generic core, profile, report, or workbench improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would make the workflow simpler or safer?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Control plane API
        - Workbench UI
        - Profile format
        - Store
        - Reports
        - Documentation
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Core Boundary
      options:
        - label: This can be described without adding team-specific data to core.
          required: true
