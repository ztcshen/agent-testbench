version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

issues:
  new: true
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - revive
    - gocyclo
    - cyclop
    - maintidx
    - dupl
    - goconst
    - gocognit
    - nakedret
    - unparam
    - prealloc
    - whitespace
    - importas
    - depguard
    - forbidigo
  settings:
    cyclop:
      max-complexity: 20
      package-average: 10
    depguard:
      rules:
        domain-no-infra:
          files:
            - "internal/domain/**/*.go"
          deny:
            - pkg: "agent-testbench/internal/store"
              desc: "domain must not depend on Store implementations"
            - pkg: "agent-testbench/internal/server"
              desc: "domain must not depend on server/control-plane code"
            - pkg: "agent-testbench/internal/runner"
              desc: "domain must not depend on runner implementations"
        internal-no-cli:
          files:
            - "internal/**/*.go"
          deny:
            - pkg: "agent-testbench/cmd/agent-testbench"
              desc: "internal packages must not depend on CLI entrypoints"
        public-pkg-no-internal:
          files:
            - "pkg/**/*.go"
          deny:
            - pkg: "agent-testbench/internal"
              desc: "public pkg code must not depend on internal business packages"
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      check-blank: true
    forbidigo:
      forbid:
        - pattern: "^print(ln)?$"
          msg: "use explicit command output, logging, or testing helpers instead of built-in print"
    gocognit:
      min-complexity: 30
    goconst:
      min-len: 4
      min-occurrences: 4
      ignore-string-values:
        # JSON payload keys, SQL column names, and wire-format enum values are
        # repeated intentionally at API/Store boundaries; constants make those
        # boundary maps harder to review without adding safety.
        - "^(ok|id|name|kind|status|error|request|response|summary|source|profile|store|service|services|environment|case|suite|report|plan|inspect|discover|coverage|gate|start|restore|audit|action|reason|body|headers|method|path|operation|result|details|steps|required|passed|active|failed|skipped|running|pending|healthy|unhealthy|external|unknown|missing|verified|current|not-run|sqlite|postgres|mysql|compose|command|container|checkout|branch|database|openapi|config|sample|timeout|workflow|register|acceptance|docker|clone|completed|draft|upgrade|replace|remove|application/json|invalid json|now:datetime|compose-service|business-service|read-model|_default|HEAD|Services|request.json|response.json|case run failed|case-failure|runtime store is not configured|run-acceptance-workflow|prepare-generated-files|skipped-after-repository-preparation|use-existing-containers|plan-docker-compose|run-docker-compose|plan-apply-mysql-sql|environment.workflow.skywalking.v1|skywalking|TPL-INTERFACE-NODE-CASE-LIST-V1|--store|--json)$"
        - "^[a-z][A-Za-z0-9]*(Id|ID|Url|URL|Json|JSON|Count|At|Ms|Name|Reason|Code)$"
        - "^[a-z]+(_[a-z]+)+$"
    gocyclo:
      min-complexity: 20
    maintidx:
      under: 20
    nakedret:
      max-func-lines: 30
    revive:
      severity: warning
    staticcheck:
      checks:
        - all
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    paths:
      - "^vendor/"
      - "^third_party/"
      - "^generated/"
      - "^gen/"
      - "^mocks/"
      - "^mock/"
      - "^testdata/"
      - "^docs/"
      - "^migrations/"
      - "^scripts/"
      - "^\\.runtime/"
      - "^\\.scratch/"
      - "^node_modules/"
      - "^control-plane/static/assets/react/"
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - ".*\\.gen\\.go$"
      - ".*_mock\\.go$"
      - ".*/wire_gen\\.go$"
      - ".*/swagger/.*"
      - ".*/openapi/.*"
    rules:
      - path: "_test\\.go$"
        linters:
          - cyclop
          - dupl
          - errcheck
          - gocognit
          - goconst
          - gocyclo
          - maintidx
          - prealloc
          - unparam
      - path: "^tools/qualitygate/"
        linters:
          - depguard

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - "^vendor/"
      - "^third_party/"
      - "^generated/"
      - "^gen/"
      - "^mocks/"
      - "^mock/"
      - "^testdata/"
      - "^docs/"
      - "^migrations/"
      - "^scripts/"
      - "^\\.runtime/"
      - "^\\.scratch/"
      - "^node_modules/"
